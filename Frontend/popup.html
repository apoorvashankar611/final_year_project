<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PhishShield</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* =====================================================
       REQUIREMENT 4: Styles for all 3 result states
       ===================================================== */

      /* Shared base for result cards */
      #result > div {
        padding: 12px 14px;
        border-radius: 6px;
        font-family: Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        margin-top: 10px;
      }

      /* STATE 1: Not a social media website */
      .not-social {
        background: #eceff1;
        border-left: 4px solid #607d8b;
        color: #37474f;
      }

      /* STATE 2: Safe social media website */
      .safe {
        background: #e8f5e9;
        border-left: 4px solid #4caf50;
        color: #2e7d32;
      }

      /* STATE 3: Phishing website detected */
      .phishing {
        background: #ffebee;
        border-left: 4px solid #ff4444;
        color: #b71c1c;
      }

      /* Generic error state */
      .error {
        background: #fff3e0;
        border-left: 4px solid #ff9800;
        color: #e65100;
        padding: 12px 14px;
        border-radius: 6px;
        font-size: 13px;
        margin-top: 10px;
      }

      /* =====================================================
       History list styles
       ===================================================== */
      .history-entry {
        padding: 10px;
        margin: 5px 0;
        border-radius: 4px;
        background: #f5f5f5;
      }
      .history-entry.phishing {
        border-left: 4px solid #ff4444;
      }
      .history-entry.safe {
        border-left: 4px solid #4caf50;
      }
      /* NEW: style for not-social entries in history */
      .history-entry.not-social {
        border-left: 4px solid #607d8b;
      }
      .history-entry .url {
        color: #666;
        font-size: 12px;
        word-break: break-all;
      }
      .history-entry .time {
        color: #999;
        font-size: 11px;
      }
      .report-link {
        color: #ff4444;
        text-decoration: none;
        font-size: 12px;
        margin-left: 5px;
      }
      .report-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h3>🛡️ PhishShield — URL Checker</h3>

    <div id="currentStatus">
      <div id="loading" style="display: none; margin-top: 10px">
        ⏳ Scanning...
      </div>
      <div id="result" style="margin-top: 10px"></div>
    </div>

    <hr />
    <h4>📜 Recent Scans</h4>
    <div id="history"></div>

    <script src="popup.js"></script>
  </body>
</html>
