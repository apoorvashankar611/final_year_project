<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PhishShield</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* ── Original result card styles (UNCHANGED) ────────── */
      #result > div {
        padding: 12px 14px;
        border-radius: 6px;
        font-family: Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        margin-top: 10px;
      }
      .not-social {
        background: #eceff1;
        border-left: 4px solid #607d8b;
        color: #37474f;
      }
      .safe {
        background: #e8f5e9;
        border-left: 4px solid #4caf50;
        color: #2e7d32;
      }
      .phishing {
        background: #ffebee;
        border-left: 4px solid #ff4444;
        color: #b71c1c;
      }
      .error {
        background: #fff3e0;
        border-left: 4px solid #ff9800;
        color: #e65100;
        padding: 12px 14px;
        border-radius: 6px;
        font-size: 13px;
        margin-top: 10px;
      }
      .history-entry {
        padding: 10px;
        margin: 5px 0;
        border-radius: 4px;
        background: #f5f5f5;
      }
      .history-entry.phishing { border-left: 4px solid #ff4444; }
      .history-entry.safe     { border-left: 4px solid #4caf50; }
      .history-entry.not-social { border-left: 4px solid #607d8b; }
      .history-entry .url  { color: #666; font-size: 12px; word-break: break-all; }
      .history-entry .time { color: #999; font-size: 11px; }
      .report-link {
        color: #ff4444;
        text-decoration: none;
        font-size: 12px;
        margin-left: 5px;
      }
      .report-link:hover { text-decoration: underline; }

      /* ── Text scan section (UNCHANGED) ─────────────────── */
      #text-scan-section {
        margin-top: 4px;
      }
      #text-scan-section h4 {
        margin: 8px 0 4px;
        font-size: 13px;
        color: #444;
      }
      #text-result-card {
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 13px;
        line-height: 1.5;
        font-family: Arial, sans-serif;
      }
      #text-result-card.text-phishing {
        background: #ffebee;
        border-left: 4px solid #e53935;
        color: #b71c1c;
      }
      #text-result-card.text-safe {
        background: #e8f5e9;
        border-left: 4px solid #43a047;
        color: #2e7d32;
      }
      #text-result-card.text-idle {
        background: #f5f5f5;
        border-left: 4px solid #bdbdbd;
        color: #757575;
        font-style: italic;
      }
      .text-preview {
        font-size: 11px;
        opacity: 0.75;
        margin-top: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 260px;
      }
      .confidence-bar-wrap {
        margin-top: 5px;
        background: rgba(0,0,0,0.08);
        border-radius: 4px;
        height: 5px;
        overflow: hidden;
      }
      .confidence-bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.4s ease;
      }
      .text-history-entry {
        padding: 8px 10px;
        margin: 4px 0;
        border-radius: 4px;
        background: #f9f9f9;
        font-size: 12px;
      }
      .text-history-entry.text-phishing { border-left: 3px solid #e53935; }
      .text-history-entry.text-safe     { border-left: 3px solid #43a047; }
      .text-history-entry .th-preview   { color: #555; margin-top: 2px; font-style: italic; }
      .text-history-entry .th-time      { color: #aaa; font-size: 10px; }

      /* ── Tab switcher (UNCHANGED) ───────────────────────── */
      .tab-bar {
        display: flex;
        border-bottom: 2px solid #e0e0e0;
        margin: 6px 0 0;
      }
      .tab-btn {
        flex: 1;
        background: none;
        border: none;
        padding: 6px 4px;
        font-size: 12px;
        cursor: pointer;
        color: #888;
        font-family: Arial, sans-serif;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
      }
      .tab-btn.active {
        color: #1565c0;
        border-bottom: 2px solid #1565c0;
        font-weight: bold;
      }
      .tab-panel { display: none; }
      .tab-panel.active { display: block; }

      /* ── NEW: Image scan section ────────────────────────── */
      #image-scan-section {
        margin-top: 4px;
      }
      #image-scan-section h4 {
        margin: 8px 0 4px;
        font-size: 13px;
        color: #444;
      }
      #imageResult {
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 13px;
        line-height: 1.5;
        font-family: Arial, sans-serif;
        font-weight: bold;
        text-align: center;
      }
      #imageResult.real  { background-color: #e8f5e9; border-left: 4px solid #43a047; color: #2e7d32; }
      #imageResult.ai    { background-color: #fff3e0; border-left: 4px solid #e67e22; color: #7f4000; }
      #imageResult.error { background-color: #ffebee; border-left: 4px solid #d9534f; color: #b71c1c; }
      #imageResult.idle  { background: #f5f5f5; border-left: 4px solid #bdbdbd; color: #757575; font-style: italic; font-weight: normal; }
    </style>
  </head>
  <body>
    <h3>🛡️ PhishShield</h3>

    <!-- ── Tab bar ────────────────────────────────────────── -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="url-tab">🔗 URL Check</button>
      <button class="tab-btn"        data-tab="text-tab">📝 Text Check</button>
      <button class="tab-btn"        data-tab="image-tab">📸 Image Check</button>
    </div>

    <!-- ══════════════════════════════════════════════════════
         TAB 1: URL Detection (ORIGINAL — UNCHANGED)
    ══════════════════════════════════════════════════════ -->
    <div id="url-tab" class="tab-panel active">
      <div id="currentStatus">
        <div id="loading" style="display: none; margin-top: 10px">⏳ Scanning...</div>
        <div id="result" style="margin-top: 10px"></div>
      </div>
      <hr />
      <h4>📜 Recent URL Scans</h4>
      <div id="history"></div>
    </div>

    <!-- ══════════════════════════════════════════════════════
         TAB 2: Text Detection (UNCHANGED)
    ══════════════════════════════════════════════════════ -->
    <div id="text-tab" class="tab-panel">
      <div id="text-scan-section">
        <h4>🖊️ Last Highlighted Text</h4>
        <div id="text-result-card" class="text-idle">
          No text scanned yet.<br>
          <small>Highlight text on any supported social media page to analyse it.</small>
        </div>

        <hr style="margin: 10px 0;" />
        <h4>📜 Recent Text Scans</h4>
        <div id="text-history"></div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════
         TAB 3: Image Detection (NEW)
         Shows result of last right-click image scan
    ══════════════════════════════════════════════════════ -->
    <div id="image-tab" class="tab-panel">
      <div id="image-scan-section">
        <h4>📸 Last Image Scan</h4>
        <div id="imageResult" class="idle">
          No image scanned yet.<br>
          <small>Right-click any image and choose "Scan this image".</small>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
    <script>
      // ── Tab switching ──────────────────────────────────────
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
          document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById(btn.dataset.tab).classList.add("active");
        });
      });

      // ── Image result display ───────────────────────────────
      const imageResultDiv = document.getElementById("imageResult");

      function displayImageResult(result) {
        if (!result) {
          imageResultDiv.innerHTML = "No image scanned yet.<br><small>Right-click any image and choose \"Scan this image\".</small>";
          imageResultDiv.className = "idle";
          return;
        }
        const isAI = result.prediction === "AI Generated";
        imageResultDiv.textContent = `${isAI ? "🤖 AI Generated" : "✅ Real Image"} — Confidence: ${result.confidence}%`;
        imageResultDiv.className = isAI ? "ai" : "real";
      }

      // Load last result when popup opens
      chrome.storage.local.get(["lastImageScan"], (res) => {
        displayImageResult(res.lastImageScan || null);
      });

      // Auto-refresh if a new scan completes while popup is open
      chrome.storage.onChanged.addListener((changes) => {
        if (changes.lastImageScan) {
          displayImageResult(changes.lastImageScan.newValue);
        }
      });
    </script>
  </body>
</html>
